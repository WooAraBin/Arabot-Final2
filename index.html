<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="브리핑">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<title>브리핑 에이전트</title>
<style>
  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #c8f542;
    --accent2: #8bc34a;
    --up: #4caf7d;
    --down: #e05555;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; min-height: 100dvh; overscroll-behavior: none; }
  .app { max-width: 480px; margin: 0 auto; padding: 0 0 100px; min-height: 100vh; min-height: 100dvh; }
  .header { padding: 56px 20px 20px; border-bottom: 0.5px solid var(--border); }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .header h1 { font-family: var(--mono); font-size: 22px; font-weight: 500; letter-spacing: -0.5px; color: var(--text); }
  .header h1 span { color: var(--accent); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); margin-top: 8px; transition: background 0.3s; }
  .status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .header-sub { font-size: 12px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.05em; }
  .section { padding: 20px; border-bottom: 0.5px solid var(--border); }
  .section-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; margin-bottom: 12px; }
  .key-row { display: flex; gap: 8px; }
  .key-input { flex: 1; background: var(--bg3); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 14px; font-family: var(--mono); font-size: 13px; color: var(--text); outline: none; transition: border-color 0.2s; }
  .key-input:focus { border-color: var(--accent); }
  .key-btn { background: var(--bg3); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 16px; font-family: var(--mono); font-size: 12px; color: var(--text2); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .key-btn:hover { border-color: var(--accent); color: var(--accent); }
  .key-saved { font-family: var(--mono); font-size: 11px; color: var(--up); margin-top: 6px; display: none; }
  .prices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .price-card { background: var(--bg3); border: 0.5px solid var(--border); border-radius: 10px; padding: 12px 14px; transition: border-color 0.2s; }
  .price-card:hover { border-color: var(--border2); }
  .price-sym { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 0.08em; margin-bottom: 4px; }
  .price-val { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--text); }
  .price-chg { font-family: var(--mono); font-size: 11px; margin-top: 3px; }
  .up { color: var(--up); }
  .down { color: var(--down); }
  .brief-section { padding: 16px 20px; }
  .brief-btn { width: 100%; background: var(--accent); color: #0a0a0a; border: none; border-radius: 12px; padding: 16px; font-family: var(--mono); font-size: 14px; font-weight: 500; letter-spacing: 0.04em; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .brief-btn:hover { background: #d4f55a; transform: translateY(-1px); }
  .brief-btn:active { transform: scale(0.98); }
  .brief-btn:disabled { background: var(--bg3); color: var(--text3); border: 0.5px solid var(--border); transform: none; cursor: not-allowed; }
  .result-section { padding: 20px; }
  .result-placeholder { text-align: center; padding: 40px 0; font-family: var(--mono); font-size: 12px; color: var(--text3); line-height: 2; }
  .result-text { font-size: 14px; color: var(--text); line-height: 1.8; white-space: pre-wrap; word-break: break-word; }
  .loading-wrap { display: flex; flex-direction: column; align-items: center; padding: 40px 0; gap: 16px; }
  .loading-bar { width: 100%; height: 2px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .loading-bar-inner { height: 100%; background: var(--accent); border-radius: 2px; animation: loading 2s ease-in-out infinite; }
  @keyframes loading { 0% { width: 0%; margin-left: 0; } 50% { width: 60%; margin-left: 20%; } 100% { width: 0%; margin-left: 100%; } }
  .loading-msg { font-family: var(--mono); font-size: 12px; color: var(--text3); }
  .ask-section { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 0.5px solid var(--border); padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); max-width: 480px; margin: 0 auto; }
  .ask-row { display: flex; gap: 8px; }
  .ask-input { flex: 1; background: var(--bg3); border: 0.5px solid var(--border); border-radius: 10px; padding: 11px 14px; font-family: var(--sans); font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; }
  .ask-input:focus { border-color: var(--border2); }
  .ask-input::placeholder { color: var(--text3); }
  .ask-send { background: var(--bg3); border: 0.5px solid var(--border); border-radius: 10px; padding: 11px 16px; font-family: var(--mono); font-size: 13px; color: var(--text2); cursor: pointer; transition: all 0.2s; }
  .ask-send:hover { border-color: var(--accent); color: var(--accent); }
  .timestamp { font-family: var(--mono); font-size: 10px; color: var(--text3); text-align: right; margin-top: 6px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <h1>BRIEF<span>.</span>AI</h1>
      <div class="status-dot" id="statusDot"></div>
    </div>
    <div class="header-sub">미중 동향 · 주식 · 코인 분석 에이전트</div>
  </div>

  <div class="section">
    <div class="section-label">Gemini API Key</div>
    <div class="key-row">
      <input type="password" class="key-input" id="apiKey" placeholder="AIzaSy..." />
      <button class="key-btn" onclick="saveKey()">저장</button>
    </div>
    <div class="key-saved" id="keySaved">✓ 저장됨</div>
  </div>

  <div class="section">
    <div class="section-label">실시간 코인</div>
    <div class="prices-grid" id="pricesGrid">
      <div class="price-card"><div class="price-sym">BTC</div><div class="price-val">—</div></div>
      <div class="price-card"><div class="price-sym">ETH</div><div class="price-val">—</div></div>
      <div class="price-card"><div class="price-sym">XRP</div><div class="price-val">—</div></div>
      <div class="price-card"><div class="price-sym">SOL</div><div class="price-val">—</div></div>
    </div>
  </div>

  <div class="brief-section">
    <button class="brief-btn" id="briefBtn" onclick="runBriefing()">
      <span id="briefBtnText">오늘 브리핑 받기</span>
    </button>
  </div>

  <div class="result-section" id="resultSection">
    <div class="result-placeholder">API 키를 입력하고<br>브리핑을 시작하세요</div>
  </div>
</div>

<div class="ask-section">
  <div class="ask-row">
    <input type="text" class="ask-input" id="askInput"
      placeholder="질문하기 (예: 테슬라 오늘 왜 떨어졌어?)"
      onkeydown="if(event.key==='Enter')askQuestion()" />
    <button class="ask-send" onclick="askQuestion()">전송</button>
  </div>
  <div class="timestamp" id="timestamp"></div>
</div>

<script>
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent';
const COINS = { bitcoin:'BTC', ethereum:'ETH', ripple:'XRP', solana:'SOL' };
let coinPriceText = '';

function saveKey() {
  const k = document.getElementById('apiKey').value.trim();
  if (!k) return;
  localStorage.setItem('gemini_key', k);
  const el = document.getElementById('keySaved');
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2000);
}

function getKey() {
  return document.getElementById('apiKey').value.trim() || localStorage.getItem('gemini_key') || '';
}

window.addEventListener('load', () => {
  const saved = localStorage.getItem('gemini_key');
  if (saved) document.getElementById('apiKey').value = saved;
  loadPrices();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
});

async function loadPrices() {
  try {
    const ids = Object.keys(COINS).join(',');
    const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`);
    const data = await r.json();
    const grid = document.getElementById('pricesGrid');
    grid.innerHTML = '';
    const lines = [];
    for (const [id, sym] of Object.entries(COINS)) {
      if (!data[id]) continue;
      const price = data[id].usd;
      const chg = data[id].usd_24h_change;
      const cls = chg >= 0 ? 'up' : 'down';
      const sign = chg >= 0 ? '+' : '';
      const fmt = price >= 1000
        ? '$' + price.toLocaleString('en-US', {maximumFractionDigits: 0})
        : '$' + price.toLocaleString('en-US', {maximumFractionDigits: 4});
      grid.innerHTML += `<div class="price-card">
        <div class="price-sym">${sym}</div>
        <div class="price-val">${fmt}</div>
        <div class="price-chg ${cls}">${sign}${chg.toFixed(2)}%</div>
      </div>`;
      lines.push(`${sym}: ${fmt} (${sign}${chg.toFixed(2)}%)`);
    }
    coinPriceText = lines.join(', ');
    document.getElementById('statusDot').classList.add('active');
  } catch(e) {
    document.getElementById('timestamp').textContent = '코인 가격 로딩 실패';
  }
}

function setLoading(msg) {
  document.getElementById('resultSection').innerHTML = `
    <div class="loading-wrap">
      <div class="loading-bar"><div class="loading-bar-inner"></div></div>
      <div class="loading-msg">${msg}</div>
    </div>`;
}

function setResult(text) {
  document.getElementById('resultSection').innerHTML =
    `<div class="result-text">${escHtml(text)}</div>`;
  document.getElementById('timestamp').textContent =
    '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function callGemini(prompt) {
  const key = getKey();
  if (!key) { setResult('API 키를 먼저 입력하고 저장해주세요.'); return null; }
  const r = await fetch(`${GEMINI_URL}?key=${key}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      tools: [{ googleSearch: {} }],
      generationConfig: { temperature: 0.7, maxOutputTokens: 3000 }
    })
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${r.status}`);
  }
  const data = await r.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '응답 없음';
}

async function runBriefing() {
  const btn = document.getElementById('briefBtn');
  btn.disabled = true;
  document.getElementById('briefBtnText').textContent = '분석 중...';
  setLoading('미중 동향 및 시장 분석 중... (약 30초)');

  const today = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'});
  const prompt = `오늘은 ${today}입니다. 실시간 구글 검색으로 최신 정보를 반드시 검색 후 한국어로 브리핑하세요.

현재 코인 실시간 가격: ${coinPriceText || '데이터 없음'}

아래 형식으로 작성하세요:

🌏 오늘의 핵심 이슈 (미중 동향)
최신 미중 관계 이슈 2~3가지 분석. X(트위터) site:x.com 소셜 동향 포함.

📈 주식 분석
테슬라 (TSLA) — 현재가/등락률, 주요 이슈, 미중 연관성 분석
엔비디아 (NVDA) — 현재가/등락률, 주요 이슈, 미중 연관성 분석
S&P500 (SPY) — 현재가/등락률, 주요 이슈, 미중 연관성 분석
Nasdaq QQQ — 현재가/등락률, 주요 이슈, 미중 연관성 분석

₿ 코인 분석
비트코인 (BTC) — 위 실시간 가격 기반, 주요 이슈, 미중 연관성
이더리움 (ETH) — 위 실시간 가격 기반, 주요 이슈, 미중 연관성
리플 (XRP) — 위 실시간 가격 기반, 주요 이슈, 미중 연관성
솔라나 (SOL) — 위 실시간 가격 기반, 주요 이슈, 미중 연관성

💡 종합 인사이트
핵심 이슈가 각 자산에 미치는 영향 요약. 단기 주목 포인트.

⚠️ 투자 조언이 아닌 정보 제공 목적입니다.`;

  try {
    const result = await callGemini(prompt);
    if (result) setResult(result);
  } catch(e) {
    setResult(`오류: ${e.message}`);
  }
  btn.disabled = false;
  document.getElementById('briefBtnText').textContent = '오늘 브리핑 받기';
}

async function askQuestion() {
  const input = document.getElementById('askInput');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  setLoading('검색 및 분석 중...');

  const prompt = `질문: ${q}

실시간 구글 검색으로 답해주세요. TSLA, NVDA, SPY, QQQ, BTC, ETH, XRP, SOL, 미중 관계 관련이면 최신 정보 포함.
X(트위터) site:x.com 소셜 동향도 포함.
한국어로 명확하고 간결하게 답변.
마지막에 "⚠️ 투자 조언이 아닌 정보 제공 목적입니다." 한 줄 추가.`;

  try {
    const result = await callGemini(prompt);
    if (result) setResult(result);
  } catch(e) {
    setResult(`오류: ${e.message}`);
  }
}
</script>
</body>
</html>
